<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzE5XOapz71msh6nFB3PGZXRTxmtCkE4r7n40TRzzzuc6d-xriowjcAI2Mlj9JuDa5Q/exec";

let allData = [];
let filteredData = [];
let prodiData = [];
let barChartObj = null;
let pieOmzetObj = null;
let pieEbitdaObj = null;
let chartEbitdaObj = null;
let chartOmzetObj = null;
let chartKPIObj = null;


function getAngkatan(nbi){

    if(!nbi)
        return "";
    nbi =
        nbi.toString().trim();

    // minimal 4 digit
    if(nbi.length < 4)
        return "";

    // ambil 2 digit mulai index ke-2
    const yy =
        parseInt(
            nbi.substr(2,2)
        );

    // tentukan abad
    let tahun = 1900 + yy;

    // bila ingin support 2000+
    if(yy < 30){
        tahun = 2000 + yy;
    }
    return tahun;
}


function filterTahun(){
    const tahun =
        document.getElementById(
            "cmbTahun"
        ).value;
    filteredData =
        allData.filter(x =>
            x.tahun == tahun
        );
    tampilData(filteredData);
}

function isiComboProdi(){
    const cmb =
        document.getElementById(
            "cmbProdi"
        );
    cmb.innerHTML = "";
    const prodi =
        [...new Set(
            allData.map(x => x.prodi)
        )];
    prodi.sort();
    prodi.forEach(p => {
        cmb.innerHTML += `
            <option value="${p}">
                ${p}
            </option>
        `;
    });
    if(prodi.length > 0){
        cmb.value = prodi[0];
    }
}

function filterProdi(){
    const prodi =
        document.getElementById(
            "cmbProdi"
        ).value;
    // DATA PRODI UNTUK DASHBOARD
    prodiData =
        allData.filter(
            item =>
                item.prodi == prodi
        );
    const cari =
        document.getElementById(
            "txtCari"
        ).value
        .toUpperCase()
        .trim();
    // DATA TAMPIL DI GRID
    filteredData =
        prodiData.filter(
            item =>
                cari == "" ||
                item.nama
                    .toUpperCase()
                    .includes(cari)
        );
    tampilData(
        filteredData
    );
}

function cariSemualama(){
    const cari =
        document.getElementById(
            "txtCari"
        ).value
        .trim()
        .toUpperCase();
    filteredData =
        prodiData.filter(item =>
            item.nama
                .toUpperCase()
                .includes(cari)
        );
    tampilData(
        filteredData
    );
}


function cariSemua(){
    const cari =
        document.getElementById(
            "txtCari"
        ).value
        .trim()
        .toUpperCase();
    if(cari == ""){
        filterProdi();
        return;
    }
    const hasil =
        allData.filter(item =>
            item.nama &&
            item.nama
                .toUpperCase()
                .includes(cari)
        );
    tampilData(
        hasil
    );
}

async function loadData(){
    try{
        const response =
            await fetch(API_URL);
        allData =
            await response.json();
        document.getElementById("loading")
            .style.display = "none";
        // isi combo tahun
        isiComboProdi();
        // tampilkan data tahun terakhir
        filterProdi();
    }
    catch(err){
        document.getElementById("loading")
            .innerHTML =
            "Gagal load data";
        console.log(err);
    }
}

    document.getElementById("dashboardModal")
        .style.display = "block";
    buatGrafik();

function closeDashboard(){
    document.getElementById("dashboardModal")

function buatGrafik(){

    const prodi =
        document.getElementById(
            "cmbProdi"
        ).value;

    const dataProdi = prodiData;

    // object penampung
    const angkatanData = {};

    // looping data prodi
    dataProdi.forEach(item => {
        const tahun =
            getAngkatan(
                item.nbi
            );

        // skip bila kosong
        if(!tahun)
            return;

        // buat counter
        if(!angkatanData[tahun]){
            angkatanData[tahun] = 0;
        }

        // tambah jumlah
        angkatanData[tahun]++;
    });

    // sorting tahun
    const sorted =
        Object.entries(
            angkatanData
        ).sort((a,b)=>
            a[0] - b[0]
        );

    // label chart
    const labels =
        sorted.map(x=>x[0]);

    // jumlah alumni
    const totals =
        sorted.map(x=>x[1]);

    // destroy chart lama
    if(barChartObj)
        barChartObj.destroy();

    // buat chart baru
    barChartObj =
        new Chart(
        document.getElementById(
            "barChart"
        ),
        {
            type:"bar",
            data:{
                labels:labels,
                datasets:[{
                    label:
                        "Jumlah Alumni",
                    data:totals,
                    backgroundColor:
                        "#1565c0"
                }]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,
                layout:{
                    padding:{
                    top:30
                    }
                },
                plugins:{
                    title:{
                        display:true,
                        text:
                        "PROFIL LULUSAN PER ANGKATAN - " + prodi,
                        font:{
                            family:"Arial",
                            size:22,
                            weight:"bold"
                        },
                        padding:{
                            top:10,
                            bottom:40
                        },
                        color:"#1565c0"
                    },
                    legend:{
                        display:false
                    },
                    datalabels:{
                        anchor:"end",
                        align:"top",
                        color:"#000",
                        font:{
                            size:12,
                            weight:"bold"
                        },
                        formatter:function(value){
                            return value;
                        }
                    },                   
                    scales:{
                        y:{
                            beginAtZero:true
                        }
                    }
                } 
            },
            plugins:[ChartDataLabels]
        }
    );
}

async function downloadDashboardPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(".dashboard-content");
    const btn =
        dashboard.querySelector(
        ".download-dashboard-btn"
        );
        btn.style.display = "none";
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
        closeBtn.style.display = "none";
    // capture dashboard
    dashboard.style.height = "auto";
    const canvas =
        await html2canvas(dashboard, {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            windowWidth: dashboard.scrollWidth,
            windowHeight: dashboard.scrollHeight
        });
    const imgData =
        canvas.toDataURL("image/png");
    // ukuran canvas
    const imgWidth = canvas.width;
    const imgHeight = canvas.height;
    // buat PDF landscape
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });
    // ukuran halaman pdf
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();
    // margin
    const margin = 5;
    // area tersedia
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);
    // hitung rasio
    const ratio =
        Math.min(
            availableWidth / imgWidth,
            availableHeight / imgHeight
        );
    // ukuran final
    const finalWidth =
        imgWidth * ratio;
    const finalHeight =
        imgHeight * ratio;
    // posisi center
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;
    // masukkan gambar
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );
    // download
    pdf.save("Dashboard_Tilik.pdf");
    dashboard.style.height = "96vh";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}


function formatTanggal(tgl){
    if(!tgl) return "";
    tgl = tgl.toString();
    // pastikan 8 digit
    if(tgl.length != 8) return tgl;
    const tahun = tgl.substring(0,4);
    const bulan = tgl.substring(4,6);
    const hari = tgl.substring(6,8);
    return hari + "-" + bulan + "-" + tahun;
}


function tampilData(data){
    const list =
        document.getElementById(
            "listData"
        );
    list.innerHTML = "";
    data.forEach(x => {
        const tr =
            document.createElement("tr");
        tr.innerHTML = `
        <td>${x.nbi}</td>
        <td>${x.nim}</td>
        <td>${x.nama}</td>
        <td>${x.alamat}</td>
        <td>${x.agama}</td>
        <td>${x.tmplahir}</td>
        <td>${formatTanggal(x.tgllahir)}</td>
        <td>${x.hp}</td>
        <td>${formatTanggal(x.tgllulus)}</td>
        <td>${x.noalumni}</td>
        <td>${x.lulusan}</td>
        <td align="center">
            <span class="pdf-icon"
                title="Biodata Alumni"
                onclick="openBiodata('${x.nbi}')">
                👤
            </span>
        </td>
        `;
        list.appendChild(tr);
    });
}

function openBiodata(nbi){
    window.open(
        "biodata.html?nbi=" + nbi,

}

function formatHasil(nilai){
    if(nilai == null || nilai == "")
        return "0,00";
    return parseFloat(nilai)
        .toLocaleString(
            "id-ID",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );
}

function toNumber(nilai){
    if(!nilai)
        return 0;
    // ubah ke string
    nilai = nilai.toString();
    // hapus titik ribuan
    nilai = nilai.replace(/\./g, "");
    // ganti koma jadi titik
    nilai = nilai.replace(",", ".");
    // convert number
    return parseFloat(nilai) || 0;
}

function toDecimal(nilai){
    if(!nilai)
        return 0;
    nilai = nilai.toString().trim();
    // hanya ganti koma ke titik
    nilai = nilai.replace(",", ".");
    return parseFloat(nilai) || 0;
}

function formatAngka(nilai){
    if(nilai == null || nilai == "")
        return "0,00";
    return parseFloat(nilai)
        .toLocaleString("id-ID", {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        });
}


function toMoney(nilai){
    if(!nilai)
        return 0;
    nilai = nilai.toString().trim();
    // hapus titik ribuan
    nilai =
        nilai.replace(/\./g, "");
    // ubah koma jadi titik
    nilai =
        nilai.replace(",", ".");
    return parseFloat(nilai) || 0;
}

function openUnitDashboard(unit){
    document.getElementById(
        "unitDashboardModal"
    ).style.display = "block";
    // destroy chart lama
    if(chartEbitdaObj)
        chartEbitdaObj.destroy();
    if(chartOmzetObj)
        chartOmzetObj.destroy();
    if(chartKPIObj)
        chartKPIObj.destroy();
    // filter unit
    const tahun =
        document.getElementById(
        "cmbTahun"
    ).value;
    const dataUnit =
        allData.filter(x =>
        x.unit == unit &&
        x.tahun <= tahun &&
        x.progres == "P"
    );
    // sorting tahun
    dataUnit.sort((a,b)=>
        a.tahun - b.tahun
    );
    // label tahun
    const labels =
        dataUnit.map(x => x.tahun);
    // data
    const omzet =
        dataUnit.map(x =>
            toNumber(x.omzet)
        );
    const ebitda =
        dataUnit.map(x =>
            toNumber(x.ebitda)
        );
    const hasil =
        dataUnit.map(x =>
            toDecimal(x.hasil)
        );

    // =========================
    // OMZET
    // =========================

    chartOmzetObj =

        document.getElementById(
            "chartOmzet"

        {
            type:"bar",
            data:{
                labels:labels,
                datasets:[{

                        display:false
                    },
                    title:{
                        display:true,
                        text:
                        "PEROLEHAN OMZET",
                        font:{
                            size:18,
                            weight:"bold"
                        }
                    },

                        anchor:"end",
                        align:"top",

                            weight:"bold",

                            return value.toLocaleString(
                            "id-ID",
                            {
                                minimumFractionDigits:0,

                            }
                            );
                        }                    
                    }
                }
            },
            plugins:[ChartDataLabels]
        });

    // =========================
    // KPI
    // =========================

    chartKPIObj =
        new Chart(

        document.getElementById(
            "chartKPI"
        ),

        {
            type:"line",
            data:{
                labels:labels,
                datasets:[{
                    label:"KPI",
                    data:hasil,
                    backgroundColor:"#fb8c00",
                    borderColor:"#fb8c00",
                    backgroundColor:"#fb8c00",

            plugins:[ChartDataLabels]
        });
}

function closeUnitDashboard(){
    document.getElementById(
        "unitDashboardModal"
    ).style.display = "none";
}

async function downloadUnitDashboardPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(
            ".unit-dashboard-content"
        );
    const btn =
        dashboard.querySelector(
        ".download-dashboard-btn"
        );
        btn.style.display = "none";
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
        closeBtn.style.display = "none";
    dashboard.style.height = "auto";
    const canvas =
        await html2canvas(dashboard, {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            windowWidth: dashboard.scrollWidth,
            windowHeight: dashboard.scrollHeight
        });
    const imgData =
        canvas.toDataURL("image/png");
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();
    const margin = 5;
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);
    const ratio =
        Math.min(
            availableWidth / canvas.width,
            availableHeight / canvas.height
        );
    const finalWidth =
        canvas.width * ratio;
    const finalHeight =
        canvas.height * ratio;
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );
    pdf.save("Dashboard_Unit.pdf");
    dashboard.style.height = "96vh";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}

);
